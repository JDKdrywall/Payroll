.brand { padding:24px 20px 16px; border-bottom:1px solid #252a38; }
.brand-big { font-size:28px; font-weight:900; color:#e8b84b; letter-spacing:4px; display:block; }
.brand-sm { font-size:10px; color:#64748b; letter-spacing:3px; }
.nav-item { padding:10px 20px; cursor:pointer; display:flex; align-items:center; gap:8px; font-size:13px; color:#64748b; border-left:3px solid transparent; user-select:none; }
.nav-item:hover { color:#e2e8f0; background:#ffffff05; }
.nav-item.active { color:#e2e8f0; background:#ffffff08; border-left-color:#e8b84b; }
.nav-section { padding:16px 20px 6px; font-size:9px; letter-spacing:2px; color:#64748b; text-transform:uppercase; }
.badge { margin-left:auto; background:#e8b84b22; color:#e8b84b; font-size:10px; padding:1px 6px; border-radius:10px; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar { padding:12px 24px; border-bottom:1px solid #252a38; display:flex; align-items:center; justify-content:space-between; background:#181c27; flex-shrink:0; flex-wrap:wrap; gap:8px; }
.week-label { font-size:13px; color:#64748b; }
.job-count { margin-left:12px; font-size:11px; background:#e8b84b22; color:#e8b84b; padding:2px 8px; border-radius:8px; }
.btn-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.btn { background:#e8b84b; color:#0f1117; border:none; border-radius:6px; padding:8px 18px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; }
.btn-green { background:#22c55e; color:#0f1117; border:none; border-radius:6px; padding:8px 18px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; }
.btn-purple { background:#6366f1; color:#fff; border:none; border-radius:6px; padding:8px 14px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; }
.btn-outline { background:transparent; color:#e8b84b; border:1px solid #e8b84b; border-radius:6px; padding:6px 14px; font-size:12px; cursor:pointer; font-family:inherit; }
.btn-icon { background:transparent; color:#64748b; border:1px solid #252a38; border-radius:6px; padding:6px 10px; font-size:15px; cursor:pointer; }
.btn-red { background:#ef4444; color:#fff; border:none; border-radius:6px; padding:8px 16px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; }
.content { flex:1; overflow-y:auto; padding:28px 32px; }
.page-title { font-size:22px; font-weight:700; color:#e2e8f0; margin-bottom:24px; }
.section-title { font-size:12px; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:2px; margin:28px 0 14px; }
/* Login */
.login-wrap { width:100%; display:flex; align-items:center; justify-content:center; background:#0f1117; }
.login-card { background:#181c27; border:1px solid #252a38; border-radius:12px; padding:48px 40px; width:360px; text-align:center; }
.login-logo { font-size:48px; font-weight:900; color:#e8b84b; letter-spacing:8px; }
.login-sub { font-size:12px; color:#64748b; margin-top:6px; letter-spacing:1px; }
.login-hint { font-size:11px; color:#64748b88; margin-top:20px; }
.input { background:#181c27; border:1px solid #252a38; border-radius:6px; color:#e2e8f0; padding:10px 14px; font-size:13px; font-family:inherit; outline:none; width:100%; margin-top:20px; }
.error-msg { color:#ef4444; font-size:12px; margin-top:8px; }
/* Cards */
.cards { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:8px; }
.stat-card { background:#181c27; border:1px solid #252a38; border-radius:10px; padding:18px; display:flex; flex-direction:column; gap:4px; }
.stat-card.accent { border-color:#e8b84b44; background:#e8b84b0a; }
.stat-icon { font-size:18px; color:#64748b; margin-bottom:4px; }
.stat-val { font-size:22px; font-weight:800; color:#e2e8f0; }
.stat-lbl { font-size:11px; color:#64748b; text-transform:uppercase; letter-spacing:1px; }
/* Crew grid */

.crew-lbl { font-size:10px; color:#64748b; }

.upload-hint { font-size:11px; color:#64748b; margin-top:6px; }

table { width:100%; border-collapse:collapse; font-size:12px; }
th { background:#181c27; padding:9px 12px; text-align:left; color:#64748b; font-size:10px; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid #252a38; white-space:nowrap; }
tr { border-bottom:1px solid #252a38; }
tr:nth-child(even) { background:#ffffff04; }
td { padding:8px 12px; color:#e2e8f0; vertical-align:middle; }
.pill { padding:2px 8px; border-radius:10px; font-size:11px; }
.pill-skim { background:#22c55e22; color:#16a34a; }
.pill-other { background:#64748b22; color:#64748b; }
/* Settings */
.settings-box { background:#1e2433; border:1px solid #334155; border-radius:10px; padding:20px 24px; max-width:480px; margin:0 0 20px; }
.settings-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.settings-title { font-size:14px; font-weight:700; color:#e2e8f0; }
.settings-label { display:block; font-size:10px; color:#64748b; text-transform:uppercase; letter-spacing:1px; margin-bottom:5px; margin-top:14px; }
.settings-hint { font-size:11px; color:#64748b; line-height:1.6; margin-top:8px; }
code { background:#0f1117; padding:2px 6px; border-radius:4px; font-size:11px; color:#e8b84b; }

.invoice-co { font-size:20px; font-weight:800; color:#e8b84b; }
.invoice-type { font-size:11px; color:#64748b; letter-spacing:3px; text-transform:uppercase; margin-top:3px; }
.invoice-totals { margin-top:18px; border-top:1px solid #252a38; padding-top:14px; max-width:400px; margin-left:auto; }
.total-row { display:flex; justify-content:space-between; padding:5px 0; font-size:13px; color:#64748b; }
.total-final { border-top:1px solid #252a38; margin-top:8px; padding-top:10px; font-size:15px; font-weight:700; color:#e8b84b; }

.notes-area { width:100%; background:#0f1117; border:1px solid #252a38; border-radius:6px; color:#e2e8f0; padding:10px; font-size:12px; font-family:inherit; resize:vertical; margin-top:6px; }

// ── HELPERS ──────────────────────────────────────────────────────────────────
function fmtMoney(n){if(!n||isNaN(n))return"$0.00";return"$"+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");}
function formatDate(d){if(!d)return"";const dt=d instanceof Date?d:new Date(d);return dt.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function teamupDateStr(d){return d.toISOString().slice(0,10);}
function getThursdayWeek(date=new Date()){const d=new Date(date);const day=d.getDay();const diff=(day>=4)?day-4:day+3;const thu=new Date(d);thu.setDate(d.getDate()-diff);const wed=new Date(thu);wed.setDate(thu.getDate()+6);return{start:thu,end:wed};}

function fixSubName(name){const low=name.toLowerCase().trim();for(const[k,v]of Object.entries(FULL_NAME_FIXES)){if(low===k||low.startsWith(k))return v;}return name;}
function getRegion(sub){for(const e of Object.values(SUBDIVISION_DB)){if(e.name===sub)return e.region;}return"Unknown";}

function parseSubject(raw){
  let s=(raw||"").replace(/\*/g,"").replace(/see notes/gi,"").replace(/wrap\s+\d+\s+sides[^,]*/gi,"")
    .replace(/[-–]\s*(first|last|1st|2nd|3rd|\d+st|\d+nd|\d+rd|\d+th)\b/gi,"").replace(/1st!+/gi,"").replace(/!+$/,"").replace(/L$/,"").trim();
  const am=s.match(/^([A-Z0-9]{2,5})\s+(\d+)(\s+.*)?$/);
  if(am){const e=SUBDIVISION_DB[am[1]];if(e)return{subdivision:e.name,lot:am[2],city:e.city,region:e.region};
    const ex=(am[3]||"").trim().replace(/^\d+/,"").trim();if(ex.length>2)return{subdivision:fixSubName(ex),lot:am[2]};}
  const fm=s.match(/^(.+?)\s+(\d{3,5})$/);if(fm)return{subdivision:fixSubName(fm[1].trim()),lot:fm[2]};
  return{subdivision:fixSubName(s),lot:""};}

function parseWorkType(w){if(!w)return"unknown";const l=w.toLowerCase();if(l.includes("skim"))return"skim";if(l.includes("tb")||l.includes("tape and bed")||l.includes("tape & bed"))return"tb";return"other";}
function parseSheets(w){if(!w)return null;const m=w.match(/(?:TB[-\s]+|tape\s+and\s+bed\s+|skim\s+)(\d+)/i);if(m)return parseInt(m[1]);const n=w.match(/(\d+)/);if(n)return parseInt(n[1]);return null;}
function getCrewName(cal){const m=cal.match(/Crews\s*>\s*(.+)/i);return m?m[1].trim():cal;}
function isST(name){return name.toLowerCase().includes("s&t")||name.toLowerCase().includes("antonio");}

function calcSTPayment(j,crew){
  if(!j.sheets)return{total:0};
  if(crew.name==="Antonio (S&T)"){const s=j.sheets<crew.minSheets?crew.sandMin:j.sheets*crew.sandRate;const t=j.sheets<crew.minSheets?crew.textureMin:j.sheets*crew.textureRate;return{sand:s,texture:t,total:s+t};}
  return{total:Math.max(j.sheets*crew.ratePerSheet,crew.minimum||0)};}

function parseCSV(text){
  const lines=text.trim().split("\n");if(lines.length<2)return[];
  const headers=lines[0].split(",").map(h=>h.replace(/"/g,"").trim());
  return lines.slice(1).map(line=>{const cols=line.split(",").map(c=>c.replace(/"/g,"").trim());const o={};headers.forEach((h,i)=>o[h]=cols[i]||"");return o;});}

function processRows(rows){
  const jobs=rows.map(row=>{
    const p=parseSubject(row.Subject||row.subject||"");
    const cal=row["Calendar Name"]||row.calendar_name||"";
    const who=row.Who||row.who||"";
    const date=row["Start Date"]||row.start_date||"";
    return{subdivision:p.subdivision,lot:p.lot,city:p.city||"",crewName:getCrewName(cal),crewRaw:cal,
      workType:parseWorkType(who),sheets:parseSheets(who),who,startDate:date,region:p.region||getRegion(p.subdivision)};});
  const tbMap={};
  jobs.forEach(j=>{if(j.workType==="tb"&&j.sheets)tbMap[j.subdivision+"|"+j.lot]=j.sheets;});
  jobs.forEach(j=>{if(j.workType==="skim"&&!j.sheets){j.sheets=tbMap[j.subdivision+"|"+j.lot]||null;j.sheetsInherited=!!j.sheets;}});
  return jobs;}

function teamupToRows(events){
  return events.map(ev=>{
    const sub=(ev.start_dt||ev.start||"").slice(0,10);
    const [y,m,d]=(sub||"--").split("-");
    return{"Subject":ev.title||"","Start Date":sub?`${m}/${d}/${y}`:"","Calendar Name":ev.subcalendar_title?(ev.subcalendar_title.includes(">")?ev.subcalendar_title:"Crews > "+ev.subcalendar_title):"","Who":ev.who||ev.notes||""};});}

// ── EXCEL EXPORT ─────────────────────────────────────────────────────────────
function exportExcel(jobs,jobsByCrew,weekLabel){
  const wb=XLSX.utils.book_new();
  // Skim sheet
  const skimRows=[["JDK Skim Jobs - "+weekLabel],[],["Crew","Date","Subdivision","Lot","Region","Sheets","Sq Ft","Rate/SF","Payment"]];
  let grand=0;
  const byCrew={};jobs.filter(j=>j.workType==="skim").forEach(j=>{if(!byCrew[j.crewName])byCrew[j.crewName]=[];byCrew[j.crewName].push(j);});
  Object.entries(byCrew).forEach(([cn,cj])=>{const fc=FINISH_CREWS.find(c=>c.name===cn);let sub=0;
    cj.forEach(j=>{const sqft=(j.sheets||0)*48;const pay=fc&&j.sheets?sqft*fc.rate:0;sub+=pay;skimRows.push([cn,j.startDate,j.subdivision,j.lot,j.region,j.sheets||"",sqft||"",fc?fc.rate:"",pay||""]);});
    grand+=sub;skimRows.push(["","","","",cn+" Subtotal","","","",sub]);skimRows.push([]);});
  skimRows.push(["","","","","TOTAL","","","",grand]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(skimRows),"This Week - Skim");
  // All jobs
  const allRows=[["Date","Subdivision","Lot","Crew","Work Type","Sheets","Sq Ft","Region"]];
  [...jobs].sort((a,b)=>new Date(a.startDate)-new Date(b.startDate)).forEach(j=>allRows.push([j.startDate,j.subdivision,j.lot,j.crewName,j.workType,j.sheets||"",j.sheets?j.sheets*48:"",j.region]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(allRows),"All Jobs");
  // Invoice per crew
  Object.entries(jobsByCrew).forEach(([cn,cj])=>{
    const fc=FINISH_CREWS.find(c=>c.name===cn);const stc=ST_CREWS.find(c=>c.name===cn);const isAnt=cn==="Antonio (S&T)";
    const billable=fc?cj.filter(j=>j.workType==="skim"):cj;
    const rows=[[fc?.company||stc?.company||cn],[fc?"FINISH INVOICE":"S&T INVOICE"],["Crew: "+cn],[]];
    if(isAnt)rows.push(["Subdivision","Lot","Task","Sheets","Sand","Texture","Region","Total"]);
    else if(fc)rows.push(["Subdivision","Lot","Task","Sq Ft","Region","Payment Due"]);
    else rows.push(["Subdivision","Lot","Task","Sheets","Region","Payment Due"]);
    let sub=0;
    billable.forEach(j=>{let pay=0,sand=null,tex=null;
      if(fc&&j.sheets)pay=j.sheets*48*fc.rate;
      if(stc&&j.sheets){const p=calcSTPayment(j,stc);pay=p.total;if(isAnt){sand=p.sand;tex=p.texture;}}
      sub+=pay;
      if(isAnt)rows.push([j.subdivision,j.lot,"Sand & Texture",j.sheets||"",sand||0,tex||0,j.region,pay]);
      else if(fc)rows.push([j.subdivision,j.lot,"Skim Coat",j.sheets?j.sheets*48:"",j.region,pay]);
      else rows.push([j.subdivision,j.lot,"Sand & Texture",j.sheets||"",j.region,pay]);});
    rows.push([]);
    const lc=isAnt?6:4;
    rows.push(Array(lc).fill("").concat(["Total Labor",sub]));
    rows.push(Array(lc).fill("").concat(["Misc Expenses",0]));
    rows.push(Array(lc).fill("").concat(["Deductions",0]));
    rows.push(Array(lc).fill("").concat(["TOTAL DUE",sub]));
    const safe=cn.replace(/[:\\\/\?\*\[\]]/g,"").slice(0,28)+" Inv";
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),safe);});
  const slug=weekLabel.replace(/[^a-zA-Z0-9]/g,"_");
  XLSX.writeFile(wb,"JDK_Payroll_"+slug+".xlsx");}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const [loggedIn,setLoggedIn]=useState(false);
  const [tab,setTab]=useState("dashboard");
  const [jobs,setJobs]=useState([]);
  const [weekLabel,setWeekLabel]=useState("");
  const [fetching,setFetching]=useState(false);
  const [importing,setImporting]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [toast,setToast]=useState(null);
  const [debugLog,setDebugLog]=useState([]);
  const [showDebug,setShowDebug]=useState(false);
  const [history,setHistory]=useState(()=>{try{return JSON.parse(localStorage.getItem("jdk_history")||"[]");}catch{return[];}});
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem("jdk_api_key")||"");
  const [calKey,setCalKey]=useState(()=>localStorage.getItem("jdk_cal_key")||"");

  function showToast(msg,type="success"){setToast({msg,type});setTimeout(()=>setToast(null),3500);}
  function log(msg){setDebugLog(p=>[...p,new Date().toLocaleTimeString()+": "+msg]);}

  function handleUpload(e){
    const file=e.target.files[0];if(!file)return;
    setImporting(true);
    const r=new FileReader();
    r.onload=ev=>{try{const rows=parseCSV(ev.target.result);const p=processRows(rows);setJobs(p);const w=getThursdayWeek();setWeekLabel(formatDate(w.start)+" – "+formatDate(w.end));showToast("Loaded "+p.length+" jobs.");setTab("dashboard");}catch(err){showToast("Error: "+err.message,"error");}setImporting(false);};
    r.readAsText(file);}

  async function handleFetch(){
    if(!apiKey||!calKey){showToast("Enter API keys in Settings first.","error");setShowSettings(true);return;}
    setFetching(true);setDebugLog([]);setShowDebug(true);
    try{
      const w=getThursdayWeek();const start=teamupDateStr(w.start);const end=teamupDateStr(w.end);
      const url=PROXY+"/proxy?cal="+calKey.trim()+"&start="+start+"&end="+end;
      log("URL: "+url);log("Key length: "+apiKey.trim().length);
      const res=await fetch(url,{headers:{"x-teamup-token":apiKey.trim(),"Content-Type":"application/json"}});
      log("Status: "+res.status);const text=await res.text();log("Response: "+text.slice(0,200));
      if(!res.ok)throw new Error("Status "+res.status+": "+text.slice(0,100));
      const data=JSON.parse(text);const events=data.events||[];log("Events: "+events.length);
      if(!events.length){setFetching(false);showToast("No events found for this week.","error");return;}
      const rows=teamupToRows(events);const p=processRows(rows);
      setJobs(p);setWeekLabel(formatDate(w.start)+" – "+formatDate(w.end));
      showToast("Fetched "+p.length+" jobs!");setTab("dashboard");
    }catch(err){log("ERROR: "+err.message);showToast("Fetch failed: "+err.message,"error");}
    setFetching(false);}

  function handleSaveSettings(ak,ck){localStorage.setItem("jdk_api_key",ak);localStorage.setItem("jdk_cal_key",ck);setApiKey(ak);setCalKey(ck);setShowSettings(false);showToast("Keys saved!");}
  function handleSaveWeek(){if(!jobs.length)return;const e={week:weekLabel,jobs,savedAt:new Date().toISOString()};const u=[e,...history].slice(0,20);setHistory(u);localStorage.setItem("jdk_history",JSON.stringify(u));showToast("Week saved.");}
  function handleExport(){if(!jobs.length){showToast("No data to export.","error");return;}try{exportExcel(jobs,jobsByCrew,weekLabel);showToast("Excel downloaded!");}catch(err){showToast("Export failed: "+err.message,"error");}}

  const jobsByCrew={};jobs.forEach(j=>{if(!jobsByCrew[j.crewName])jobsByCrew[j.crewName]=[];jobsByCrew[j.crewName].push(j);});
  const crews=[...new Set(jobs.map(j=>j.crewName))];

  if(!loggedIn)return h(LoginScreen,{onLogin:()=>setLoggedIn(true)});

  return h("div",{id:"app-wrap",style:{display:"flex",height:"100vh",overflow:"hidden"}},
    h(Sidebar,{tab,setTab,crews,jobsByCrew}),
    h("div",{className:"main"},
      h(TopBar,{weekLabel,jobCount:jobs.length,fetching,onFetch:handleFetch,onSettings:()=>setShowSettings(!showSettings),onExport:handleExport,onSave:handleSaveWeek}),
      toast&&h(Toast,{msg:toast.msg,type:toast.type}),
      showDebug&&debugLog.length>0&&h("div",{className:"debug-panel"},
        h("div",{style:{display:"flex",justifyContent:"space-between",color:"#64748b",marginBottom:6,fontSize:10}},h("span",null,"DEBUG"),h("button",{onClick:()=>setShowDebug(false),style:{background:"none",border:"none",color:"#64748b",cursor:"pointer"}},"✕")),
        debugLog.map((l,i)=>h("div",{key:i,className:"debug-line",style:{color:l.includes("ERROR")?"#ef4444":l.includes("Status: 2")?"#22c55e":"#e2e8f0"}},l))),
      showSettings&&h(SettingsPanel,{apiKey,calKey,onSave:handleSaveSettings,onClose:()=>setShowSettings(false)}),
      tab==="dashboard"&&h(Dashboard,{jobs,jobsByCrew,onUpload:handleUpload,importing}),
      tab==="alljobs"&&h(AllJobsTable,{jobs}),
      tab==="bycrew"&&h(ByCrewView,{jobsByCrew}),
      tab==="history"&&h(HistoryView,{history}),
      tab.startsWith("inv:")&&h(InvoiceView,{crewName:tab.replace("inv:",""),jobs:jobsByCrew[tab.replace("inv:","")]||[]})));}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
