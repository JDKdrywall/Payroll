// ─── PARSING UTILITIES ────────────────────────────────────────────────────────

function parseSubject(raw) {
  let s = raw || "";
  s = s.replace(/\*/g, "").trim();
  s = s.replace(/see notes/gi, "").trim();
  s = s.replace(/wrap\s+\d+\s+sides[^,]*/gi, "").trim();
  s = s.replace(/[-–]\s*(first|last|1st|2nd|3rd|\d+st|\d+nd|\d+rd|\d+th)\b/gi, "").trim();
  s = s.replace(/1st!+/gi, "").trim();
  s = s.replace(/!+$/, "").trim();
  s = s.replace(/L$/, "").trim();

  // Check for ABBREV + LOT pattern
  const abbrevMatch = s.match(/^([A-Z0-9]{2,5})\s+(\d+)(\s+.*)?$/);
  if (abbrevMatch) {
    const abbrev = abbrevMatch[1];
    const lot = abbrevMatch[2];
    const extra = (abbrevMatch[3] || "").trim();
    const entry = SUBDIVISION_DB[abbrev];
    if (entry) return { subdivision: entry.name, lot, city: entry.city, region: entry.region, raw: s };
    // Pattern 2: abbrev + lot + full name in subject
    if (extra) {
      const cleaned = extra.replace(/^\d+/, "").trim();
      if (cleaned.length > 2) return { subdivision: fixSubdivisionName(cleaned), lot, raw: s };
    }
  }

  // Full name + lot
  const fullMatch = s.match(/^(.+?)\s+(\d{3,5})$/);
  if (fullMatch) {
    return { subdivision: fixSubdivisionName(fullMatch[1].trim()), lot: fullMatch[2], raw: s };
  }

  return { subdivision: fixSubdivisionName(s), lot: "", raw: s };
}

function fixSubdivisionName(name) {
  const lower = name.toLowerCase().trim();
  for (const [key, val] of Object.entries(FULL_NAME_FIXES)) {
    if (lower === key || lower.startsWith(key)) return val;
  }
  return name;
}

function parseSheets(whoField) {
  if (!whoField) return null;
  const upper = whoField.toUpperCase();
  // TB- 166, tape and bed 207, etc.
  const m = whoField.match(/(?:TB[-\s]+|tape\s+and\s+bed\s+|skim\s+)(\d+)/i);
  if (m) return parseInt(m[1]);
  // standalone number
  const n = whoField.match(/(\d+)/);
  if (n) return parseInt(n[1]);
  return null;
}

function parseWorkType(whoField) {
  if (!whoField) return "unknown";
  const lower = whoField.toLowerCase();
  if (lower.includes("skim")) return "skim";
  if (lower.includes("tb") || lower.includes("tape and bed") || lower.includes("tape & bed")) return "tb";
  return "other";
}

function getRegion(subdivision) {
  if (REGION_SUBDIVISIONS[subdivision]) return REGION_SUBDIVISIONS[subdivision];
  for (const entry of Object.values(SUBDIVISION_DB)) {
    if (entry.name === subdivision) return entry.region;
  }
  return "Unknown";
}

function lookupSubdivision(abbr) {
  const key = (abbr || "").trim().toUpperCase();
  return SUBDIVISION_DB[key] || null;
}

function getCrewType(calendarName) {
  const lower = (calendarName || "").toLowerCase();
  if (lower.includes("s&t") || lower.includes("sand") || lower.includes("texture")) return "st";
  return "finish";
}

function getCrewName(calendarName) {
  // "Crews > Jose Crew" → "Jose Crew"
  const m = calendarName.match(/Crews\s*>\s*(.+)/i);
  return m ? m[1].trim() : calendarName;
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.replace(/"/g, "").trim());
  return lines.slice(1).map(line => {
    const cols = line.split(",").map(c => c.replace(/"/g, "").trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = cols[i] || "");
    return obj;
  });
}

function processCSVData(rows) {
  const jobs = rows.map(row => {
    const parsed = parseSubject(row.Subject || row.subject || "");
    const crewRaw = row["Calendar Name"] || row.calendar_name || "";
    const who = row.Who || row.who || "";
    const startDate = row["Start Date"] || row.start_date || "";
    return {
      raw: row,
      subdivision: parsed.subdivision,
      lot: parsed.lot,
      city: parsed.city || "",
      crewRaw,
      crewName: getCrewName(crewRaw),
      crewType: getCrewType(crewRaw),
      workType: parseWorkType(who),
      sheets: parseSheets(who),
      who,
      startDate,
      region: parsed.region || getRegion(parsed.subdivision),
    };
  });

  // Sheet count inheritance: if skim has no sheets, inherit from TB with same sub+lot
  const tbMap = {};
  jobs.forEach(j => {
    if (j.workType === "tb" && j.sheets) {
      tbMap[`${j.subdivision}|${j.lot}`] = j.sheets;
    }
  });
  jobs.forEach(j => {
    if (j.workType === "skim" && !j.sheets) {
      j.sheets = tbMap[`${j.subdivision}|${j.lot}`] || null;
      j.sheetsInherited = !!j.sheets;
    }
  });

  return jobs;
}

function calcFinishPayment(job, crew) {
  if (!job.sheets || job.workType !== "skim") return 0;
  const sqft = job.sheets * 48;
  return sqft * crew.rate;
}

function calcSTPayment(job, crew) {
  if (!job.sheets) return { total: 0 };
  if (crew.name === "Antonio (S&T)") {
    const sandPay = job.sheets < crew.minSheets ? crew.sandMin : job.sheets * crew.sandRate;
    const texPay = job.sheets < crew.minSheets ? crew.textureMin : job.sheets * crew.textureRate;
    return { sand: sandPay, texture: texPay, total: sandPay + texPay };
  }
  const pay = Math.max(job.sheets * crew.ratePerSheet, crew.minimum || 0);
  return { total: pay };
}

function getThursdayWeek(date = new Date()) {
  const d = new Date(date);
  const day = d.getDay(); // 0=Sun, 4=Thu
  // Find last Thursday
  const diff = (day >= 4) ? day - 4 : day + 3;
  const thu = new Date(d);
  thu.setDate(d.getDate() - diff);
  const wed = new Date(thu);
  wed.setDate(thu.getDate() + 6);
  return { start: thu, end: wed };
}

function formatDate(d) {
  if (!d) return "";
  const dt = d instanceof Date ? d : new Date(d);
  return dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

function fmtMoney(n) {
  if (n == null || isNaN(n)) return "$0.00";
  return "$" + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

// Styling helpers
const XL = {
  headerFill: { patternType: "solid", fgColor: { rgb: "1A1F2E" } },
  headerFont: { bold: true, color: { rgb: "E8B84B" }, name: "Arial", sz: 10 },
  bodyFont: { name: "Arial", sz: 10 },

  currency: '"$"#,##0.00',
  number: "#,##0",
};

function xlCell(v, opts = {}) {
  const cell = { v, t: opts.t || (typeof v === "number" ? "n" : "s") };
  if (opts.z) cell.z = opts.z;
  if (opts.s) cell.s = opts.s;
  return cell;
}

function setColWidths(ws, widths) {
  ws["!cols"] = widths.map(w => ({ wch: w }));
}

function applyStyles(ws, range, styleFn) {
  for (let R = range.s.r; R <= range.e.r; R++) {
    for (let C = range.s.c; C <= range.e.c; C++) {
      const addr = XLSX.utils.encode_cell({ r: R, c: C });
      if (!ws[addr]) ws[addr] = { v: "", t: "s" };
      ws[addr].s = styleFn(R, C);
    }
  }
}

// Build "This Week - Skim" sheet
function buildSkimSheet(jobs, weekLabel) {
  const skimJobs = jobs.filter(j => j.workType === "skim");
  const rows = [];

  // Title row
  rows.push([`JDK Skim Jobs — ${weekLabel}`]);
  rows.push([]);
  rows.push(["Crew", "Date", "Subdivision", "Lot #", "Region", "Sheets", "Sq Ft", "Rate/SF", "Payment Due"]);

  // Group by crew
  const byCrew = {};
  skimJobs.forEach(j => {
    if (!byCrew[j.crewName]) byCrew[j.crewName] = [];
    byCrew[j.crewName].push(j);
  });

  let crewTotal = 0;
  Object.entries(byCrew).forEach(([crewName, cjobs]) => {
    const fc = FINISH_CREWS.find(c => c.name === crewName);
    let subtotal = 0;
    cjobs.forEach(j => {
      const sqft = (j.sheets || 0) * 48;
      const pay = fc && j.sheets ? sqft * fc.rate : 0;
      subtotal += pay;
      rows.push([crewName, j.startDate, j.subdivision, j.lot, j.region,
        j.sheets || "", sqft || "", fc ? fc.rate : "", pay || ""]);
    });
    crewTotal += subtotal;
    rows.push(["", "", "", "", `${crewName} Subtotal`, "", "", "", subtotal]);
    rows.push([]);
  });

  rows.push(["", "", "", "", "TOTAL", "", "", "", crewTotal]);

  const ws = XLSX.utils.aoa_to_sheet(rows);
  setColWidths(ws, [18, 12, 26, 8, 16, 8, 10, 10, 14]);

  // Format currency columns (H=7, I=8) — rows after header
  const dataStart = 3;
  rows.forEach((row, ri) => {
    if (ri < dataStart) return;
    ["H", "I"].forEach(col => {
      const addr = `${col}${ri + 1}`;
      if (ws[addr] && ws[addr].t === "n") ws[addr].z = XL.currency;
    });
  });

  return ws;
}

// Build per-crew invoice sheet
function buildInvoiceSheet(crewName, jobs, weekLabel, misc = 0, deductions = 0) {
  const fc = FINISH_CREWS.find(c => c.name === crewName);
  const stc = ST_CREWS.find(c => c.name === crewName);
  const isAntonio = crewName === "Antonio (S&T)";
  const billable = fc ? jobs.filter(j => j.workType === "skim") : jobs;
  const company = fc?.company || stc?.company || crewName;
  const w = getThursdayWeek();
  const rows = [];

  // Header block
  rows.push([company]);
  rows.push([fc ? "FINISH INVOICE" : "SAND & TEXTURE INVOICE"]);
  rows.push([`Crew: ${crewName}`]);
  rows.push([`Week: ${formatDate(w.start)} – ${formatDate(w.end)}`]);
  rows.push([]);

  // Column headers
  if (isAntonio) {
    rows.push(["Subdivision", "Lot #", "Task", "Sheets", "Sand", "Texture", "Region", "Total"]);
  } else if (fc) {
    rows.push(["Subdivision", "Lot #", "Task", "Sq Ft", "Region", "Payment Due"]);
  } else {
    rows.push(["Subdivision", "Lot #", "Task", "Sheets", "Region", "Payment Due"]);
  }

  let subtotal = 0;
  billable.forEach(j => {
    let pay = 0, sand = null, texture = null;
    if (fc && j.sheets) pay = j.sheets * 48 * fc.rate;
    if (stc && j.sheets) {
      const p = calcSTPayment(j, stc);
      pay = p.total;
      if (isAntonio) { sand = p.sand; texture = p.texture; }
    }
    subtotal += pay;
    const task = fc ? "Skim Coat" : "Sand & Texture";
    if (isAntonio) {
      rows.push([j.subdivision, j.lot, task, j.sheets || "", sand || 0, texture || 0, j.region, pay]);
    } else if (fc) {
      rows.push([j.subdivision, j.lot, task, j.sheets ? j.sheets * 48 : "", j.region, pay]);
    } else {
      rows.push([j.subdivision, j.lot, task, j.sheets || "", j.region, pay]);
    }
  });

  rows.push([]);

  // Totals block
  const labelCol = isAntonio ? 6 : 4;
  const valCol = isAntonio ? 7 : 5;

  rows.push(Array(labelCol).fill("").concat([`Total ${fc ? "Finish" : "S&T"} Labor`, subtotal]));
  rows.push(Array(labelCol).fill("").concat(["Additional Misc. Expenses", misc]));
  rows.push(Array(labelCol).fill("").concat(["Misc. Deductions", deductions]));
  rows.push(Array(labelCol).fill("").concat(["TOTAL PAYMENT DUE", subtotal + misc - deductions]));

  const ws = XLSX.utils.aoa_to_sheet(rows);

  if (isAntonio) {
    setColWidths(ws, [26, 8, 16, 8, 12, 12, 14, 14]);
  } else if (fc) {
    setColWidths(ws, [26, 8, 14, 10, 14, 14]);
  } else {
    setColWidths(ws, [26, 8, 16, 8, 14, 14]);
  }

  // Format currency in payment columns
  const payCol = isAntonio ? "H" : "F";
  const sandCol = "E"; const texCol = "F";
  for (let r = 6; r <= rows.length; r++) {
    const addr = `${payCol}${r}`;
    if (ws[addr] && ws[addr].t === "n") ws[addr].z = XL.currency;
    if (isAntonio) {
      [sandCol, texCol].forEach(c => {
        const a = `${c}${r}`;
        if (ws[a] && ws[a].t === "n") ws[a].z = XL.currency;
      });
    }
  }

  return ws;
}

// Master export function — builds full workbook
function exportToExcel(jobs, jobsByCrew, weekLabel) {
  const wb = XLSX.utils.book_new();

  // Core tracker tabs
  XLSX.utils.book_append_sheet(wb, buildSkimSheet(jobs, weekLabel), "This Week - Skim");
  XLSX.utils.book_append_sheet(wb, buildAllJobsSheet(jobs), "All Jobs");
  XLSX.utils.book_append_sheet(wb, buildByCrewSheet(jobs), "By Crew");
  XLSX.utils.book_append_sheet(wb, buildByDateSheet(jobs), "By Date");

  // One invoice tab per crew
  Object.entries(jobsByCrew).forEach(([crewName, crewJobs]) => {
    const safeTabName = crewName.replace(/[:\\\/\?\*\[\]]/g, "").slice(0, 31);
    const ws = buildInvoiceSheet(crewName, crewJobs, weekLabel);
    XLSX.utils.book_append_sheet(wb, ws, `${safeTabName} Invoice`);
  });

  // Download
  const weekSlug = weekLabel.replace(/[^a-zA-Z0-9]/g, "_");
  XLSX.writeFile(wb, `JDK_Payroll_${weekSlug}.xlsx`);
}

// ─── TEAMUP API ───────────────────────────────────────────────────────────────

function teamupDateStr(d) {
  // YYYY-MM-DD format for Teamup API
  return d.toISOString().slice(0, 10);
}

const PROXY_URL = "https://teamup-proxy.eric-91f.workers.dev";

async function fetchTeamupEvents(apiKey, calendarKey, startDate, endDate) {
  const start = teamupDateStr(startDate);
  const end = teamupDateStr(endDate);
  const url = `${PROXY_URL}/proxy?cal=${calendarKey}&start=${start}&end=${end}`;
  const res = await fetch(url, {
    headers: {
      "x-teamup-token": apiKey,
      "Content-Type": "application/json",
    },
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Teamup API error ${res.status}: ${txt}`);
  }
  const data = await res.json();
  return data.events || [];
}

function teamupEventsToCSVRows(events) {
  // Convert Teamup API event objects to the same shape as CSV rows
  return events.map(ev => {
    // title → Subject, start_dt → Start Date
    // subcalendar_title → Calendar Name (format: "Crews > X")
    // who field is in notes or custom field — best effort from title + notes
    const subject = ev.title || "";
    const startDate = (ev.start_dt || ev.start || "").slice(0, 10);
    // Format date as MM/DD/YYYY to match CSV parser
    const [y, m, d] = startDate.split("-");
    const fmtDate = startDate ? `${m}/${d}/${y}` : "";
    const calendarName = ev.subcalendar_title
      ? (ev.subcalendar_title.includes(">") ? ev.subcalendar_title : `Crews > ${ev.subcalendar_title}`)
      : "";
    // "who" — Teamup stores this in the "who" field or notes
    const who = ev.who || ev.notes || "";
    return {
      "Subject": subject,
      "Start Date": fmtDate,
      "Calendar Name": calendarName,
      "Who": who,
    };
  });
}

function JDKApp() {
  const [screen, setScreen] = useState("login");
  const [password, setPassword] = useState("");
  const [authError, setAuthError] = useState("");
  const [csvText, setCsvText] = useState("");
  const [jobs, setJobs] = useState([]);
  const [activeTab, setActiveTab] = useState("dashboard");
  const [selectedCrew, setSelectedCrew] = useState(null);
  const [weekLabel, setWeekLabel] = useState("");
  const [history, setHistory] = useState(() => {
    try { return JSON.parse(localStorage.getItem("jdk_history") || "[]"); } catch { return []; }
  });
  const [toast, setToast] = useState(null);
  const [importing, setImporting] = useState(false);
  const [fetching, setFetching] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [debugLog, setDebugLog] = useState([]);
  const [showDebug, setShowDebug] = useState(false);
  const log = (msg) => setDebugLog(prev => [...prev, `${new Date().toLocaleTimeString()}: ${msg}`]);
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("jdk_api_key") || "");
  const [calKey, setCalKey] = useState(() => localStorage.getItem("jdk_cal_key") || "");

  const APP_PASSWORD = "JDK2024!";

  const showToast = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  };

  const handleLogin = () => {
    if (password === APP_PASSWORD) {
      setScreen("app");
      const w = getThursdayWeek();
      setWeekLabel(`${formatDate(w.start)} – ${formatDate(w.end)}`);
    } else {
      setAuthError("Incorrect password.");
      setTimeout(() => setAuthError(""), 2000);
    }
  };

  const handleCSVUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      setCsvText(text);
      processData(text);
    };
    reader.readAsText(file);
  };

  const processData = (text) => {
    setImporting(true);
    setTimeout(() => {
      try {
        const rows = parseCSV(text);
        const processed = processCSVData(rows);
        setJobs(processed);
        setImporting(false);
        showToast(`Loaded ${processed.length} jobs successfully.`);
        setActiveTab("dashboard");
      } catch (err) {
        setImporting(false);
        showToast("Error parsing CSV: " + err.message, "error");
      }
    }, 400);
  };

  const saveToHistory = () => {
    if (!jobs.length) return;
    const entry = { week: weekLabel, jobs, savedAt: new Date().toISOString() };
    const updated = [entry, ...history].slice(0, 20);
    setHistory(updated);
    localStorage.setItem("jdk_history", JSON.stringify(updated));
    showToast("Week saved to history.");
  };

  const handleExport = () => {
    if (!jobs.length) { showToast("No data to export.", "error"); return; }
    try {
      exportToExcel(jobs, jobsByCrew, weekLabel);
      showToast("Excel file downloaded!");
    } catch (err) {
      showToast("Export failed: " + err.message, "error");
    }
  };

  const handleSaveSettings = (newApiKey, newCalKey) => {
    localStorage.setItem("jdk_api_key", newApiKey);
    localStorage.setItem("jdk_cal_key", newCalKey);
    setApiKey(newApiKey);
    setCalKey(newCalKey);
    setShowSettings(false);
    showToast("Settings saved.");
  };

  const handleFetchTeamup = async () => {
    if (!apiKey || !calKey) {
      showToast("Add your API key and calendar key in Settings first.", "error");
      setShowSettings(true);
      return;
    }
    setFetching(true);
    setDebugLog([]);
    setShowDebug(true);
    try {
      const w = getThursdayWeek();
      const start = teamupDateStr(w.start);
      const end = teamupDateStr(w.end);
      const trimmedCal = calKey.trim();
      const trimmedKey = apiKey.trim();
      const url = `https://teamup-proxy.eric-91f.workers.dev/proxy?cal=${trimmedCal}&start=${start}&end=${end}`;

      log(`URL: ${url}`);
      log(`API key length: ${trimmedKey.length}`);
      log(`Cal key: ${trimmedCal}`);

      const res = await fetch(url, {
        headers: {
          "x-teamup-token": trimmedKey,
          "Content-Type": "application/json",
        },
      });

      log(`Status: ${res.status}`);
      const text = await res.text();
      log(`Response: ${text.slice(0, 300)}`);

      if (!res.ok) throw new Error(`Status ${res.status}: ${text.slice(0, 200)}`);

      const data = JSON.parse(text);
      const events = data.events || [];
      log(`Events found: ${events.length}`);

      if (!events.length) {
        setFetching(false);
        showToast("No events found for this week.", "error");
        return;
      }
      const rows = teamupEventsToCSVRows(events);
      const processed = processCSVData(rows);
      setJobs(processed);
      setWeekLabel(`${formatDate(w.start)} – ${formatDate(w.end)}`);
      setFetching(false);
      showToast(`Fetched ${processed.length} jobs from Teamup.`);
      setActiveTab("dashboard");
    } catch (err) {
      setFetching(false);
      log(`ERROR: ${err.message}`);
      showToast("Teamup fetch failed: " + err.message, "error");
    }
  };

  // Group jobs by crew for invoicing
  const jobsByCrew = {};
  jobs.forEach(j => {
    if (!jobsByCrew[j.crewName]) jobsByCrew[j.crewName] = [];
    jobsByCrew[j.crewName].push(j);
  });

  const skimJobs = jobs.filter(j => j.workType === "skim");
  const allCrews = [...new Set(jobs.map(j => j.crewName))];

  if (screen === "login") return <LoginScreen password={password} setPassword={setPassword} onLogin={handleLogin} error={authError} />;

  return (
    <div style={styles.app}>
      <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} crews={allCrews} jobsByCrew={jobsByCrew} />
      <main style={styles.main}>
        <TopBar
          weekLabel={weekLabel}
          onSave={saveToHistory}
          onExport={handleExport}
          onFetch={handleFetchTeamup}
          onSettings={() => setShowSettings(true)}
          jobCount={jobs.length}
          fetching={fetching}
          hasKeys={!!(apiKey && calKey)}
        />
        {toast && <Toast msg={toast.msg} type={toast.type} />}
        {showDebug && debugLog.length > 0 && (
          <div style={styles.debugPanel}>
            <div style={styles.debugHeader}>
              <span>Debug Log</span>
              <button style={styles.closeBtn} onClick={() => setShowDebug(false)}>✕</button>
            </div>
            {debugLog.map((line, i) => (
              <div key={i} style={{ ...styles.debugLine, color: line.includes("ERROR") ? "#ef4444" : line.includes("Status: 2") ? "#22c55e" : "#e2e8f0" }}>
                {line}
              </div>
            ))}
          </div>
        )}
        {showSettings && (
          <SettingsPanel
            apiKey={apiKey}
            calKey={calKey}
            onSave={handleSaveSettings}
            onClose={() => setShowSettings(false)}
          />
        )}
        {activeTab === "dashboard" && (
          <Dashboard
            jobs={jobs}
            skimJobs={skimJobs}
            jobsByCrew={jobsByCrew}
            weekLabel={weekLabel}
            onUpload={handleCSVUpload}
            importing={importing}
          />
        )}
        {activeTab === "alljobs" && <AllJobsTable jobs={jobs} />}
        {activeTab === "bycrew" && <ByCrewView jobsByCrew={jobsByCrew} />}
        {activeTab === "history" && <HistoryView history={history} />}
        {activeTab.startsWith("invoice:") && (
          <InvoiceView crewName={activeTab.replace("invoice:", "")} jobs={jobsByCrew[activeTab.replace("invoice:", "")] || []} />
        )}
      </main>
    </div>
  );
}

function getCrewType2(crewName) {

function calcTotalPay(jobs) {
  let total = 0;
  jobs.forEach(j => {
    if (j.workType === "skim") {
      const fc = FINISH_CREWS.find(c => c.name === j.crewName);
      if (fc && j.sheets) total += (j.sheets * 48) * fc.rate;
    }
    if (getCrewType2(j.crewName) === "st" && j.sheets) {
      const stc = ST_CREWS.find(c => c.name === j.crewName);
      if (stc) {
        const p = calcSTPayment(j, stc);
        total += p.total;
      }
    }
  });
  return total;
}

function StatCard({ label, value, icon, accent }) {
  return (
    <div style={{ ...styles.statCard, ...(accent ? styles.statCardAccent : {}) }}>
      <div style={styles.statIcon}>{icon}</div>
      <div style={styles.statValue}>{value}</div>
      <div style={styles.statLabel}>{label}</div>
    </div>
  );
}

function CrewCard({ crewName, jobs }) {
  const fc = FINISH_CREWS.find(c => c.name === crewName);
  const stc = ST_CREWS.find(c => c.name === crewName);
  const isFinish = !!fc;
  const isST = !!stc;
  const skimJobs = isFinish ? jobs.filter(j => j.workType === "skim") : jobs;
  let total = 0;
  if (isFinish) skimJobs.forEach(j => { if (j.sheets) total += (j.sheets * 48) * fc.rate; });
  if (isST) skimJobs.forEach(j => { if (j.sheets) { const p = calcSTPayment(j, stc); total += p.total; } });
  const color = fc ? fc.color : "#64748b";

  return (
    <div style={{ ...styles.crewCard, borderLeftColor: color }}>
      <div style={styles.crewCardHeader}>
        <span style={{ ...styles.crewDotBig, background: color }} />
        <span style={styles.crewCardName}>{crewName}</span>
      </div>
      <div style={styles.crewStats}>
        <div><span style={styles.crewStatNum}>{isFinish ? skimJobs.length : jobs.length}</span> <span style={styles.crewStatLbl}>{isFinish ? "skim" : "jobs"}</span></div>
        <div><span style={styles.crewStatNum}>{fmtMoney(total)}</span> <span style={styles.crewStatLbl}>pay</span></div>
      </div>
      {(fc || stc) && <div style={styles.crewRate}>{isFinish ? `$${fc.rate}/sf` : isST ? (stc.ratePerSheet ? `$${stc.ratePerSheet}/sheet` : "Variable rate") : ""}</div>}
    </div>
  );
}

// ─── INVOICE VIEW ─────────────────────────────────────────────────────────────

function InvoiceView({ crewName, jobs }) {
  const [misc, setMisc] = useState(0);
  const [deductions, setDeductions] = useState(0);
  const [notes, setNotes] = useState("");

  const fc = FINISH_CREWS.find(c => c.name === crewName);
  const stc = ST_CREWS.find(c => c.name === crewName);
  const isAntonio = crewName === "Antonio (S&T)";

  const billable = fc ? jobs.filter(j => j.workType === "skim") : jobs;
  const w = getThursdayWeek();

  let subtotal = 0;
  const rows = billable.map(j => {
    let pay = 0, sand = null, texture = null;
    if (fc && j.sheets) pay = (j.sheets * 48) * fc.rate;
    if (stc && j.sheets) {
      const p = calcSTPayment(j, stc);
      pay = p.total;
      if (isAntonio) { sand = p.sand; texture = p.texture; }
    }
    subtotal += pay;
    return { ...j, pay, sand, texture };
  });

  const total = subtotal + (parseFloat(misc) || 0) - (parseFloat(deductions) || 0);

  return (
    <div style={styles.content}>
      <div style={styles.invoiceWrap}>
        {/* Header */}
        <div style={styles.invoiceHeader}>
          <div>
            <div style={styles.invoiceCo}>{fc?.company || stc?.company || crewName}</div>
            <div style={styles.invoiceType}>{fc ? "FINISH INVOICE" : "S&T INVOICE"}</div>
            <div style={styles.invoiceCrew}>Crew: {crewName}</div>
          </div>
          <div style={styles.invoiceMeta}>
            <div style={styles.invoiceWeek}>Week of {formatDate(w.start)}</div>
            <div style={styles.invoiceWeek}>Through {formatDate(w.end)}</div>
          </div>
        </div>

        {/* Table */}
        <div style={styles.tableWrap}>
          <table style={styles.table}>
            <thead>
              <tr>
                <th style={styles.th}>Subdivision</th>
                <th style={styles.th}>Lot #</th>
                <th style={styles.th}>Task</th>
                {fc && <th style={styles.th}>Sq Ft</th>}
                {stc && !isAntonio && <th style={styles.th}>Sheets</th>}
                {isAntonio && <><th style={styles.th}>Sheets</th><th style={styles.th}>Sand</th><th style={styles.th}>Texture</th></>}
                <th style={styles.th}>Region</th>
                <th style={styles.th}>Payment Due</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((j, i) => (
                <tr key={i} style={{ ...styles.tr, ...(i % 2 === 0 ? styles.trEven : {}) }}>
                  <td style={styles.td}>{j.subdivision}</td>
                  <td style={styles.td}>{j.lot}</td>
                  <td style={styles.td}>{j.workType === "skim" ? "Skim Coat" : "Sand & Texture"}</td>
                  {fc && <td style={styles.td}>{j.sheets ? (j.sheets * 48).toLocaleString() : "?"}</td>}
                  {stc && !isAntonio && <td style={styles.td}>{j.sheets || "?"}</td>}
                  {isAntonio && (
                    <>
                      <td style={styles.td}>{j.sheets || "?"}</td>
                      <td style={styles.td}>{j.sand != null ? fmtMoney(j.sand) : "—"}</td>
                      <td style={styles.td}>{j.texture != null ? fmtMoney(j.texture) : "—"}</td>
                    </>
                  )}
                  <td style={styles.td}>{j.region}</td>
                  <td style={{ ...styles.td, fontWeight: 600 }}>{fmtMoney(j.pay)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* Totals */}
        <div style={styles.invoiceTotals}>
          <div style={styles.invoiceTotalRow}>
            <span>Total {fc ? "Finish" : "S&T"} Labor</span>
            <span style={styles.invoiceTotalVal}>{fmtMoney(subtotal)}</span>
          </div>
          <div style={styles.invoiceTotalRow}>
            <span>Additional Misc. Expenses</span>
            <span>
              <input
                style={styles.inlineInput}
                type="number"
                value={misc}
                onChange={e => setMisc(e.target.value)}
                placeholder="0.00"
              />
            </span>
          </div>
          <div style={styles.invoiceTotalRow}>
            <span>Misc. Deductions</span>
            <span>
              <input
                style={styles.inlineInput}
                type="number"
                value={deductions}
                onChange={e => setDeductions(e.target.value)}
                placeholder="0.00"
              />
            </span>
          </div>
          <div style={{ ...styles.invoiceTotalRow, ...styles.invoiceTotalFinal }}>
            <span>TOTAL PAYMENT DUE</span>
            <span>{fmtMoney(total)}</span>
          </div>
        </div>

        {/* Notes */}
        <div style={styles.invoiceNotes}>
          <div style={styles.invoiceNotesLabel}>Notes</div>
          <textarea
            style={styles.notesArea}
            value={notes}
            onChange={e => setNotes(e.target.value)}
            placeholder="Add any notes here..."
            rows={3}
          />
        </div>

        <div style={{ display: "flex", gap: 12, marginTop: 20 }}>
          <button style={styles.btn} onClick={() => window.print()}>
            🖨️ Print / Save as PDF
          </button>
          <button style={styles.btnExport} onClick={() => {
            try {
              const wb = XLSX.utils.book_new();
              const ws = buildInvoiceSheet(crewName, jobs, "", parseFloat(misc) || 0, parseFloat(deductions) || 0);
              const safeTab = crewName.replace(/[:\\\/\?\*\[\]]/g, "").slice(0, 31);
              XLSX.utils.book_append_sheet(wb, ws, `${safeTab} Invoice`);
              XLSX.writeFile(wb, `JDK_Invoice_${crewName.replace(/\s+/g, "_")}.xlsx`);
            } catch (err) { alert("Export failed: " + err.message); }
          }}>
            ⬇ Export This Invoice
          </button>
        </div>
      </div>
    </div>
  );
}
